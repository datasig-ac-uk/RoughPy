name: ruff

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "220-roughpy-jax"
      - "335-typecheck-ruff"
    paths: &ruff_paths
      - ".github/workflows/ruff.yml"
      - ".pre-commit-config.yaml"
      - "ruff.toml"
      - "pyproject.toml"
      - "roughpy_jax/**/*.py"
      - "benchmarks/**/*.py"
      - "examples/**/*.py"
  pull_request_target:
    branches: 
      - "main"
      - "220-roughpy-jax"
      - "335-typecheck-ruff"
    paths: *ruff_paths

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:  
      matrix:
        python-version: ["3.11","3.12","3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          version: "0.10.12"
          enable-cache: true

      - name: Install lint dependencies
        shell: bash
        run: uv sync --extra lint --no-install-project

      - name: Ruff lint
        shell: bash
        run: uv run ruff check . --output-format=github

      - name: Ruff format check
        shell: bash
        run: uv run ruff format . --check
