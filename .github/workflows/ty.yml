name: ty

on:
  workflow_dispatch:
  push:
    branches: &ty_branches
      - "main"
    paths: &ty_paths
      - ".github/workflows/ty.yml"
      - "ty.toml"
      - "pyproject.toml"
      - "roughpy_jax/**/*.py"
      - "benchmarks/**/*.py"
  pull_request:
    branches: *ty_branches
    paths: *ty_paths

permissions:
  contents: read

jobs:
  ty:
    runs-on: ubuntu-latest
    strategy:  
      matrix:
        python-version: ["3.11","3.12","3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          version: "0.10.12"
          enable-cache: true

      - name: Install typecheck dependencies
        shell: bash
        run: uv sync --extra typecheck --no-install-project

      - name: Setup gha caching for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout vcpkg
        shell: bash
        run: git clone --depth=1 https://github.com/Microsoft/vcpkg.git tools/vcpkg

      - name: Configure CMake
        run: |
          cmake -B "${{ github.workspace }}/build" \
            -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" \
            -DROUGHPY_BUILD_TESTS=ON \
            -DROUGHPY_JAX=ON
        env:
          CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}/tools/vcpkg/scripts/buildsystems/vcpkg.cmake
          VCPKG_FORCE_SYSTEM_BINARIES: 1

      - name: Build
        run: cmake --build "${{ github.workspace }}/build" --config "${{ env.BUILD_TYPE }}"

      - name: Ty type check
        shell: bash
        run: uv run ty check . --output-format=github 